name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mcp pytest pytest-cov
        pip install -e .
        
    - name: Run Widget Tests
      run: |
        # Run tests for each widget individually to avoid 'src' namespace collisions
        for d in cg/*; do
          if [ -d "$d/tests" ]; then
            echo "Running tests for $d..."
            PYTHONPATH=$PYTHONPATH:$(pwd)/$d pytest $d/tests
          fi
        done
        
    - name: Run CLI Tests
      run: |
        pytest tests/test_cli.py
