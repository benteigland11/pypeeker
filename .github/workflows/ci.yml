name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mcp pytest pytest-cov
        pip install -e .
        
    - name: Run Tests
      run: |
        # Run pytest on the entire project
        # This will pick up all widget tests in cg/ and top-level tests
        pytest --cov=pypeeker --cov=cg
