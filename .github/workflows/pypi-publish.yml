name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Verify tag matches setup.py version
      run: |
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        SETUP_VERSION=$(grep -oP '(?<=^    version=")[^"]+' setup.py)
        if [ "$TAG_VERSION" != "$SETUP_VERSION" ]; then
          echo "::error::Tag v$TAG_VERSION does not match setup.py version $SETUP_VERSION"
          exit 1
        fi
        echo "Tag v$TAG_VERSION matches setup.py version $SETUP_VERSION"
    - name: Install build
      run: python3 -m pip install build --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pypeeker-cli
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
